<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .void-container {
            width: 100%;
            max-width: 700px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 45px;
        }

        .gaster-text {
            font-size: 32px;
            letter-spacing: 6px;
            line-height: 1.8;
            color: #ffffff;
            animation: tremor-void 0.03s infinite linear;
            user-select: none;
            word-wrap: break-word;
            max-width: 100%;
        }

        .caixa-entrada {
            background: #000000;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 10px;
            font-size: 16px;
            font-family: monospace;
            text-align: center;
            outline: none;
            width: 220px;
        }

        .botao-enviar {
            background: transparent;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 5px 15px;
            font-family: monospace;
            cursor: pointer;
            margin-top: 15px;
        }

        .link-voltar {
            color: #333333;
            text-decoration: none;
            font-size: 11px;
            margin-top: 30px;
        }

        #tela-revelacao {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #imagem-secreta {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        @keyframes tremor-void {
            0% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-6px, 5px) rotate(-3deg); }
            20% { transform: translate(6px, -5px) rotate(3deg); }
            30% { transform: translate(-7px, -2px) rotate(1deg); }
            40% { transform: translate(4px, 6px) rotate(-2deg); }
            50% { transform: translate(-4px, -4px) rotate(3deg); }
            60% { transform: translate(7px, 3px) rotate(0deg); }
            70% { transform: translate(-3px, 7px) rotate(-3deg); }
            80% { transform: translate(5px, -6px) rotate(2deg); }
            90% { transform: translate(-5px, 3px) rotate(3deg); }
            100% { transform: translate(4px, -3px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <div class="void-container" id="conteudo-void">
        <div id="mensagem-container" class="gaster-text"></div>
        
        <div id="input-container" style="display: none; flex-direction: column; align-items: center;">
            <input type="text" id="resposta-user" class="caixa-entrada" placeholder="...">
            <button class="botao-enviar" onclick="verificarResposta()">Proceed</button>
        </div>

        <a href="index.html" class="link-voltar">go back</a>
    </div>

    <div id="tela-revelacao">
        <img id="imagem-secreta" src="" alt="Proceed">
    </div>

    <script>
        const LINK_DO_SEU_GIF = "https://media1.tenor.com/m/tVABNji6FsYAAAAC/weird-route-thorn-ring.gif"; 

        const gifPreload = new Image();
        gifPreload.src = LINK_DO_SEU_GIF;

        const mensagensEN = [
            "things might start to get weird",
            "proceed",
            "use her",
            "how to stop your enemies?"
        ];

        const gasterWingdings = {
            'a': '✌︎', 'b': '👌︎', 'c': '👍︎', 'd': '👎︎', 'e': '☜︎', 'f': '☞︎', 'g': '☝︎', 'h': '☟︎', 'i': '✋︎', 'j': '☺︎',
            'k': '😐︎', 'l': '☹︎', 'm': '💣︎', 'n': '☠︎', 'o': '⚐︎', 'p': '︎', 'q': '✈︎', 'r': '☼︎', 's': '💧', 't': '❄',
            'u': '🕆︎', 'v': '✞︎', 'w': '🕈︎', 'x': '✠︎', 'y': '✡︎', 'z': '☪︎',
            ' ': ' ', '?': '✆', "'": "'"
        };
        
        const indiceSorteado = Math.floor(Math.random() * mensagensEN.length);
        const textoOriginal = mensagensEN[indiceSorteado];
        const container = document.getElementById("mensagem-container");

        function traduzirParaGaster(texto) {
            let resultado = "";
            for (let i = 0; i < texto.length; i++) {
                const letra = texto[i].toLowerCase();
                if (gasterWingdings[letra]) {
                    resultado += gasterWingdings[letra];
                } else {
                    resultado += letra;
                }
            }
            return resultado;
        }

        container.textContent = traduzirParaGaster(textoOriginal);

        if (indiceSorteado === 3) {
            document.getElementById("input-container").style.display = "flex";
        }

        function verificarResposta() {
            const entrada = document.getElementById("resposta-user").value.trim().toLowerCase();
            if (entrada === "iceshock") {
                const imgSecreta = document.getElementById("imagem-secreta");
                if (imgSecreta) imgSecreta.src = gifPreload.src;

                document.getElementById("conteudo-void").style.display = "none";
                document.getElementById("tela-revelacao").style.display = "flex";

                setTimeout(iniciarAtaqueProceed, 3000);
            } else {
                document.getElementById("resposta-user").style.borderColor = "#ff0000";
                document.getElementById("resposta-user").value = "";
            }
        }

        function iniciarAtaqueProceed() {
            const containerCaos = document.createElement("div");
            containerCaos.style.position = "fixed";
            containerCaos.style.top = "0";
            containerCaos.style.left = "0";
            containerCaos.style.width = "100vw";
            containerCaos.style.height = "100vh";
            containerCaos.style.overflow = "hidden";
            containerCaos.style.zIndex = "99999";
            containerCaos.style.background = "rgba(0,0,0,0.4)"; 
            containerCaos.style.pointerEvents = "none"; 
            document.body.appendChild(containerCaos);

            const intervaloCaos = setInterval(() => {
                const span = document.createElement("span");
                span.textContent = "PROCEED ";
                span.style.position = "absolute";
                span.style.color = "#ff0000";
                span.style.fontFamily = "monospace";
                span.style.fontWeight = "bold";
                span.style.fontSize = Math.floor(Math.random() * 32 + 16) + "px";
                span.style.left = Math.floor(Math.random() * 100) + "vw";
                span.style.top = Math.floor(Math.random() * 100) + "vh";
                span.style.transform = `rotate(${Math.floor(Math.random() * 40 - 20)}deg)`;
                containerCaos.appendChild(span);
            }, 25);

            setTimeout(() => {
                clearInterval(intervaloCaos);
                simularCrash();
            }, 3500);
        }

        function simularCrash() {
            document.body.innerHTML = "";
            document.body.style.background = "#000000";
            document.body.style.width = "100vw";
            document.body.style.height = "100vh";
            document.body.style.overflow = "hidden";
            
            const telaErro = document.createElement("div");
            telaErro.style.color = "#ffffff";
            telaErro.style.fontFamily = "sans-serif";
            telaErro.style.padding = "30px";
            telaErro.style.position = "fixed";
            telaErro.style.top = "15%";
            telaErro.style.left = "10%";
            telaErro.style.zIndex = "999999";
            
            telaErro.innerHTML = `
                <h1 style="font-size: 32px; color: #ff3333; margin-bottom: 12px; font-weight: bold;">Aw, [[Hyperlink blocked]]!</h1>
                <p style="font-size: 18px; color: #cccccc; margin-bottom: 8px;">Something went wrong while displaying this webpage.</p>
                <p style="font-size: 14px; color: #777777;">Error code: LOST_GIRL_NOT_FOUND</p>
            `;
            document.body.appendChild(telaErro);

            window.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
            }, true);
            
            document.body.addEventListener('touchmove', (e) => {
                e.preventDefault();
            }, { passive: false });
        }
    </script>
</body>
</html>
